# go-semantic-release configuration for repo.
# Phase 1 of the two-phase release pipeline:
#   1. Analyze commits → determine next semantic version
#   2. Write CHANGELOG.md and VERSION
#   3. Push git tag (e.g. v0.2.0)
#   4. Commit updated files back to main with [skip ci]
#
# Phase 2 (binary builds and GitHub Release) is handled by GoReleaser,
# triggered automatically by the v* tag pushed here.

release_mode: repo
tag_format: "v{{.Version}}"

branches:
  - name: main
    is_default: true
  - name: beta
    prerelease: true
    channel: beta
  - name: alpha
    prerelease: true
    channel: alpha

prepare:
  changelog_file: CHANGELOG.md
  version_file: VERSION

# GoReleaser owns the GitHub Release creation and asset uploads.
# semantic-release only creates the tag; it does not open a release.
github:
  create_release: false
  owner: jedi-knights
  repo: repo

git_author:
  name: semantic-release-bot
  email: semantic-release-bot@users.noreply.github.com
